# ava-base1b — 1B-class target (RTX 4080 Laptop 12GB, WSL2)
#
# MEASURED param count: 1409M (`python -m ava.config --preset base1b --count-params`).
# specs/08 predicted 1.17B; it undercounted the Multi-J-Space, which is NOT just
# "slots ~0.3M". Each of the 4 workspaces carries 2 MultiheadAttention (4*d^2 each)
# + mod_gate (d^2) + broad_proj (d^2) = 10*d^2 = 41.9M at d=2048, and there are 4
# cross-space attentions at 4*d^2 = 16.8M each. J-Space total ~235M.
#   embed (tied)  65.5M
#   48 layers   1109M   (GQA attn 10.5M + SwiGLU h=2048 12.6M = 23.1M each)
#   J-Space      235M
#                -----
#                1409M
# The blueprint's literal MHA + 4x MLP + untied 128k vocab is ~2.9B and cannot fit 12GB.
#
# VRAM at 1409M: bf16 weights 2.8GB + bf16 grads 2.8GB + AdamW8bit states ~2.8GB
# = 8.4GB before activations. With ~11.6GB free that leaves ~3GB for activations,
# which needs FULL gradient checkpointing at ctx 2048 micro-batch 1.
# This is TIGHT. Re-measure before the M1 run; if it OOMs, drop n_fusion_layers
# 28 -> 24 (-92M) or halve the workspace widths. Decided at the Stage 9 GO/NO-GO.
#
# Throughput ~1.0-1.5k tok/s => ~100M tokens/day. MILESTONE schedule, stop-anytime via WSD stable ckpts.
preset: base1b

model:
  vocab_size: 32000
  d_model: 2048
  n_heads: 16
  n_kv_heads: 4                # GQA — requires spec 04's config-gated GQA support
  head_dim: 128
  mlp: swiglu                  # spec 04 config-gated; nano/mini keep blueprint GELU 4x
  mlp_ratio: 1.0
  n_text_layers: 12
  n_fusion_layers: 28
  n_reasoning_layers: 8
  tie_lm_head: true
  tie_verbalizer: true
  multimodal: false            # vision/audio deferred; encoders remain in code, gated off
  qk_norm: true
  rope_base_init: 10000

jspace:                        # blueprint values verbatim
  slots:      {system1: 32, system2: 64, critic: 16, planner: 32}
  half_life:  {system1: 8, system2: 300, critic: 30, planner: 150}
  hl_weight:  {system1: 0.6, system2: 0.8, critic: 1.0, planner: 0.7}
  broadcast_target: {system1: 0.18, system2: 0.22, critic: 0.20, planner: 0.20}
  s2_verbalizable_mass: 0.065
  critic_vm: 0.08
  inter_mi_cos_target: 0.45
  inter_mi_weight: 0.3
  routing_weight: 0.4
  routing_targets:
    automatic:  [0.60, 0.15, 0.10, 0.15]
    deliberate: [0.15, 0.55, 0.10, 0.20]
    safety:     [0.10, 0.20, 0.60, 0.10]
    temporal:   [0.10, 0.30, 0.10, 0.50]
  base_loss_weights: {report: 1.0, broadcast: 0.5, selectivity: 0.3, modulation: 0.5}
  j_weight: {early: 0.08, late: 0.15}

training:
  device: cuda
  precision: bf16
  compile: true
  gradient_checkpointing: true
  optimizer: {name: adamw8bit, betas: [0.9, 0.95], weight_decay: 0.1, grad_clip: 1.0}  # bitsandbytes
  tokens_per_step: 524_288          # micro 1-2 x seq 2048 x large accum
  wsd: {warmup_steps: 2000, stable_frac: 0.92, lr_max: 2.0e-4, lr_min: 2.0e-5}   # blueprint values
  checkpoint_every_steps: 200
  metrics_every_steps: 10

# Milestone schedule (each milestone ends at a WSD stable checkpoint; anneal replays only on final)
milestones:
  - {name: M1, tokens_total: 2_000_000_000,  phases: [p0_logic, p1_math], gate: "probes: arithmetic/logic clearly above mini"}
  - {name: M2, tokens_total: 10_000_000_000, phases: [p2_foundation],     gate: "heldout PPL + canonical J-tests trending"}
  - {name: M3, tokens_total: 30_000_000_000, phases: [p3_reasoning, p4_long, p5_anneal], gate: "full eval report; fork branches"}

phases:                              # proportions per blueprint; token counts are per-milestone budgets above
  - {name: p0_logic,      frac: 0.10, seq: 2048,  rope_base: 10000,   ntk: 1.0, mix: {logic: 1.0}}
  - {name: p1_math,       frac: 0.10, seq: 2048,  rope_base: 10000,   ntk: 1.0, mix: {math: 0.85, logic: 0.15}}
  # tool_use = agentic workflows / harness skills (react_tools generator); same
  # emphasis as mini: foundation vocabulary → tool workflows → grounded anneal.
  - {name: p2_foundation, frac: 0.47, seq: 2048,  rope_base: 10000,   ntk: 1.0, mix: {encyclopedia: 0.30, code: 0.20, tool_use: 0.15, math: 0.15, logic: 0.10, chat: 0.10}}
  - {name: p3_reasoning,  frac: 0.18, seq: 8192,  rope_base: 50000,   ntk: 1.0, mix: {math_reasoning: 0.30, tool_use: 0.30, logic: 0.15, temporal: 0.15, code: 0.10}}
  - {name: p4_long,       frac: 0.07, seq: 16384, rope_base: 500000,  ntk: 1.5, mix: {long_docs: 0.70, needle: 0.30}}
  - {name: p5_anneal,     frac: 0.08, seq: 16384, rope_base: 1000000, yarn: true, mix: {tool_use: 0.25, proofs_verified: 0.20, chat: 0.20, safety: 0.20, math_reasoning: 0.15}}
  # NOTE 12GB reality: ctx >16k at 1B needs micro-batch 1 + aggressive checkpointing; 64k-128k blueprint
  # contexts are out of reach on this GPU — YaRN eval-time extension covers the long-context probe instead.

branches:                            # fork from any stable ckpt; blueprint BRANCH_CONFIGS scaled
  code: {freeze: [system1], lr: 1.0e-4, router_bias: [0.25, 0.45, 0.05, 0.25],
         target_hl: {system2: 350, planner: 200}, mix: {code: 0.50, code_long: 0.20, jobbench_code: 0.15, general: 0.15}}
  math: {freeze: [system1, planner], lr: 8.0e-5, router_bias: [0.10, 0.65, 0.20, 0.05],
         target_hl: {system2: 400, critic: 40}, mix: {math_formal: 0.55, proofs: 0.20, synthetic_math: 0.15, general: 0.10}}
  chat: {freeze: [system1, system2], lr: 5.0e-5, router_bias: [0.15, 0.25, 0.35, 0.25],
         target_hl: {critic: 35, planner: 180}, mix: {chat: 0.30, safety: 0.20, delegation: 0.25, temporal: 0.15, counterfactual: 0.10}}

data:
  seed: 1234
  raw_dir: data/base1b/raw
  packed_dir: data/base1b/packed
  heldout_tokens_per_phase: 5_000_000
  tokenizer_path: data/mini/tokenizer/ava_bpe_32k.json   # shared with mini
