# Source registry for the Dottie collector.
#
# Maps HuggingFace datasets and local synthetic generators onto the 6-phase
# curriculum. The collector reads this file, and for a target phase selects a
# source by mixture `weight` (smooth weighted round-robin). Within any single
# phase the source weights sum to ~1.0 -- that sum is the mixture for the phase.
#
# Curriculum (see PLAN.md). Agentic/tool-use (react_tools) runs through
# P2/P3/P5 so the harness ecosystem — tools, skills, observations — is
# curriculum material from the foundation phase onward, not an SFT bolt-on:
#   P0 logic       : synthetic only
#   P1 math        : open-web-math (light) + synthetic math
#   P2 foundation  : fineweb-edu (edu>=2) + github-code + cosmopedia + synthetic facts + react skills
#   P3 reasoning   : proof-pile-2 + open-web-math + synthetic CoT/temporal + react tool-use + synthetic workflows
#   P4 long        : fineweb-edu (long docs) + synthetic needle-in-haystack + synthetic workflows
#   P5 anneal      : fineweb-edu (edu>=4.5) + proof-pile-2 (verified) + synthetic safety + react grounding + workflows
#
# Every `dataset` + `config` pair below was verified against the HF API to exist
# and to be `gated:false` before being committed here. Changing a config name
# without re-verifying will make the collector fail at runtime.
#
# Fields per entry:
#   name        stable id; also the doc_id prefix and the /raw/<name>/ dir
#   kind        hf | synthetic
#   dataset     HF dataset id (hf only)
#   config      HF config/name (hf only; null if the dataset has none)
#   split       HF split (hf only)
#   text_field  record key holding the training text
#   score_field record key holding a quality score (hf only; optional)
#   generator   synthetic generator id (synthetic only)
#   trust_remote_code  true for script-based HF datasets (proof-pile-2, github-code)
#   phases      curriculum phases this source feeds
#   weight      {phase: mixture_weight} -- per phase, weights across sources sum ~1.0
#   task_type   automatic | deliberate | safety | temporal
#   filters     min_chars (int or {phase:int}), min_edu_score ({phase:float} on score_field)
#   license / gated  provenance

sources:
  # ---- synthetic generators (no network; deterministic per doc index) --------
  # P0 logic: Shannon entropy 10% strategic (logic first elicits reasoning, entropy foundation for LM-as-compression)
  - name: synth_logic
    kind: synthetic
    generator: logic
    text_field: text
    phases: [0]
    weight: {0: 0.90}
    task_type: deliberate
    filters: {min_chars: 1}
    license: synthetic
    gated: false

  # Compression curriculum — strategically placed across all 6 phases per ANTIDOOM_COMPRESSION_ASSESSMENT.md
  # P0: Shannon entropy/Kraft 25% family — information theory basics S1 Fast hl=8
  # P1: Huffman prefix codes/Kraft 20% + arithmetic 15% — combinatorial math
  # P2: LZ77/LZW dictionary coding 20% — code early foundation, O(n*window)
  # P3: BWT/ANS + Z-token compress/reconstruct 10%+10% — reasoning chains 6000+ chars, semantic compression
  # P4: Z-token long docs 50% >16k + neural compression 144 slots = 20% broadcast — long context
  # P5: verified compression proofs + Z-token anneal — high-quality 1%
  # J-Space mapping: S1 automatic entropy drills, S2 deliberate Huffman/LZ/BWT, Planner temporal Z-token, Critic verifies decompressed
  - name: synth_compression
    kind: synthetic
    generator: compression
    text_field: text
    phases: [0, 1, 2, 3, 4, 5]
    weight: {0: 0.10, 1: 0.15, 2: 0.10, 3: 0.10, 4: 0.10, 5: 0.10}
    task_type: deliberate
    filters: {min_chars: 1}
    license: synthetic
    gated: false

  - name: synth_math
    kind: synthetic
    generator: math
    text_field: text
    phases: [1]
    weight: {1: 0.425}
    task_type: deliberate
    filters: {min_chars: 1}
    license: synthetic
    gated: false

  - name: synth_facts
    kind: synthetic
    generator: ency
    text_field: text
    phases: [2]
    weight: {2: 0.135}
    task_type: automatic
    filters: {min_chars: 1}
    license: synthetic
    gated: false

  # MathGenerator covers phases 1/3/4; phase decides which curriculum it emits.
  - name: synth_code
    kind: synthetic
    generator: code
    text_field: text
    phases: [2]
    weight: {2: 0.09}
    task_type: deliberate
    filters: {min_chars: 1}
    license: synthetic
    gated: false

  - name: synth_cot
    kind: synthetic
    generator: math
    text_field: text
    phases: [3]
    weight: {3: 0.135}
    task_type: temporal
    filters: {min_chars: 1}
    license: synthetic
    gated: false

  # Long-context / needle-in-haystack docs come from EncyclopediaGenerator (p4),
  # not MathGenerator -- verified by inspecting the phases each actually emits.
  - name: synth_needle
    kind: synthetic
    generator: ency
    text_field: text
    phases: [4]
    weight: {4: 0.18}
    task_type: automatic
    filters: {min_chars: 1}
    license: synthetic
    gated: false

  - name: synth_safety
    kind: synthetic
    generator: chat
    text_field: text
    phases: [5]
    weight: {5: 0.135}
    task_type: safety
    filters: {min_chars: 1}
    license: synthetic
    gated: false

  # Agentic workflows / tool usage / skills (Thought:/Action:/Observation:).
  # P2 = skill leverage as foundation vocabulary; P3 = tool calls and
  # multi-step workflows; P5 = grounding-heavy anneal (notfound + cite).
  - name: synth_react
    kind: synthetic
    generator: react_tools
    text_field: text
    phases: [2, 3, 5]
    weight: {2: 0.135, 3: 0.27, 5: 0.225}
    task_type: deliberate
    filters: {min_chars: 1}
    license: synthetic
    gated: false

  # JobBench-style delegation dossiers (occupation x reconciliation task) and
  # Gaia2-style async/dynamic scheduling scenarios -- see
  # dottie/datagen/workflow_jobbench.py and workflow_gaia2.py. Weights follow the
  # blueprint's own p3/p4/p5 emphasis (inner_monologue_research.md): jobbench
  # skews toward reasoning (p3), gaia2 skews toward long/async context (p4).
  # Existing p3/p4/p5 source weights above were rescaled down proportionally
  # to make room for BOTH this and synth_react so each phase still sums to
  # ~1.0 (the two source PRs were authored independently of each other).
  - name: synth_jobbench
    kind: synthetic
    generator: jobbench
    text_field: text
    phases: [3, 4, 5]
    weight: {3: 0.09, 4: 0.09, 5: 0.045}
    task_type: deliberate
    filters: {min_chars: 1}
    license: synthetic
    gated: false

  - name: synth_gaia2
    kind: synthetic
    generator: gaia2
    text_field: text
    phases: [3, 4, 5]
    weight: {3: 0.045, 4: 0.135, 5: 0.09}
    task_type: temporal
    filters: {min_chars: 1}
    license: synthetic
    gated: false

  # ---- HuggingFace streaming sources -----------------------------------------
  - name: open_web_math
    kind: hf
    dataset: open-web-math/open-web-math
    config: default
    split: train
    text_field: text
    phases: [1, 3]
    weight: {1: 0.425, 3: 0.18}
    task_type: deliberate
    filters: {min_chars: 200}
    license: odc-by
    gated: false

  - name: fineweb_edu
    kind: hf
    dataset: HuggingFaceFW/fineweb-edu
    config: sample-10BT
    split: train
    text_field: text
    score_field: score
    phases: [2, 4, 5]
    weight: {2: 0.315, 4: 0.495, 5: 0.18}
    task_type: automatic
    filters:
      min_chars: {2: 200, 4: 4000, 5: 200}   # P4 = long documents only
      min_edu_score: {2: 2.0, 5: 4.5}         # P5 anneal = highest quality only
    license: odc-by
    gated: false

  - name: github_code
    kind: hf
    dataset: codeparrot/github-code
    config: Python-mit
    split: train
    text_field: code
    trust_remote_code: true
    phases: [2]
    weight: {2: 0.135}
    task_type: automatic
    filters: {min_chars: 200}
    license: mit
    gated: false

  - name: cosmopedia
    kind: hf
    dataset: HuggingFaceTB/cosmopedia
    config: web_samples_v2
    split: train
    text_field: text
    phases: [2]
    weight: {2: 0.09}
    task_type: automatic
    filters: {min_chars: 200}
    license: apache-2.0
    gated: false

  - name: proof_pile_2
    kind: hf
    dataset: EleutherAI/proof-pile-2
    config: arxiv
    split: train
    text_field: text
    trust_remote_code: true
    phases: [3, 5]
    weight: {3: 0.18, 5: 0.225}
    task_type: deliberate
    filters: {min_chars: 200}
    license: various
    gated: false

  # ---- smoke-test source (small, fast, ungated) ------------------------------
  - name: tinystories
    kind: hf
    dataset: roneneldan/TinyStories
    config: default
    split: train
    text_field: text
    phases: [2]
    weight: {2: 0.0}          # 0 mixture weight: never auto-selected, --once only
    task_type: automatic
    filters: {min_chars: 1}
    license: cdla-sharing-1.0
    gated: false
